spring.application.name=eHealth


spring.mongodb.uri=${MONGO_URI}
spring.data.mongodb.auto-index-creation=true
# Render
server.port=${PORT:8080}

    
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${USERNAME}
spring.mail.password=${PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.is-production=false

# Cloudinary
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUD_API}
cloudinary.api-secret=${CLOUD_SECERT}

# WebRTC (signaling only)
webrtc.stun.server=stun:stun.l.google.com:19302

# 1. Specify the name and location of the text file
logging.file.name=${LOGGING_FILE_NAME:logs/ehealth-requests.txt}
# 2. Set the logging format for the file (Optional, but makes it cleaner)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 3. Ensure your custom interceptor is logging at the INFO level
logging.level.com.eHealth.eHealth.config.ControllerLoggingInterceptor=INFO