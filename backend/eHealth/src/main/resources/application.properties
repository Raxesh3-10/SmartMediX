spring.application.name=eHealth


spring.mongodb.uri=${MONGO_URI}
spring.data.mongodb.auto-index-creation=true
# Render
server.port=${PORT}


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${USERNAME}
spring.mail.password=${PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.is-production=false

# Cloudinary
cloudinary.cloud-name=${CLOUDE_NAME}
cloudinary.api-key=${CLOUDE_API}
cloudinary.api-secret=${CLOUDE_SECERT}

# WebRTC (signaling only)
webrtc.stun.server=stun:stun.l.google.com:19302
